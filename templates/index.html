<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>URL Threat Detector</title>
  <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
  <style>
    /* Reset & basic styling */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Arial', sans-serif;
      background-color: #0d1117;
      color: #ffffff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100vh;
    }

    /* Navbar */
    .navbar {
      width: 100%;
      background: #161b22;
      padding: 25px 0;
      text-align: center;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
      position: fixed;
      top: 0;
      left: 0;
      z-index: 100;
    }
    .navbar h1 {
      margin: 0;
      font-size: 32px;
      font-weight: bold;
      color: #58a6ff;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
    }

    /* Main container */
    .container {
      margin-top: 120px; /* give space for fixed navbar */
      background: #1c2128;
      padding: 40px;
      border-radius: 12px;
      width: 90%;
      max-width: 800px;
      text-align: center;
    }

    /* Form and input styling */
    label {
      font-size: 18px;
      display: block;
      margin-bottom: 8px;
      text-align: left;
      color: #c9d1d9;
    }
    input[type="text"], input[type="file"] {
      width: 95%;
      padding: 14px;
      font-size: 18px;
      border: 2px solid #58a6ff;
      border-radius: 8px;
      background-color: #22272e;
      color: white;
      margin-bottom: 15px;
      outline: none;
    }
    input[type="text"]::placeholder {
      color: #8b949e;
    }

    button {
      background-color: #238636;
      color: white;
      padding: 14px;
      font-size: 18px;
      border-radius: 8px;
      cursor: pointer;
      width: 100%;
      transition: 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      border: none;
    }
    button:hover {
      background-color: #2ea043;
      transform: scale(1.03);
    }
    .scan-icon {
      font-size: 20px;
    }

    /* Spinner */
    .spinner {
      display: none;
      margin: 10px auto;
      border: 5px solid #f3f3f3;
      border-top: 5px solid #3498db;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Result box */
    .result-box {
      margin-top: 20px;
      padding: 15px;
      border-radius: 5px;
      font-size: 18px;
      text-align: left;
    }
    .benign { background-color: #134e4a; color: #34D399; }
    .defacement { background-color: #78350f; color: #F59E0B; }
    .malware { background-color: #7f1d1d; color: #EF4444; }
    .phishing { background-color: #4c1d95; color: #8B5CF6; }
    .unknown { background-color: #1f2937; color: #ffffff; }

    /* Headings inside container */
    .container h2 {
      font-size: 26px;
      margin-bottom: 20px;
      color: #58a6ff;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
    }

    /* Responsive */
    @media (max-width: 600px) {
      .container {
        padding: 20px;
        margin-top: 100px;
      }
      button, input[type="text"], input[type="file"] {
        font-size: 16px;
        padding: 12px;
      }
    }
  </style>
  <script>
    function showSpinner(formId, spinnerId) {
      document.getElementById(spinnerId).style.display = 'block';
      // hide after 3 seconds (simulate)
      setTimeout(() => {
        document.getElementById(spinnerId).style.display = 'none';
      }, 3000);
    }
  </script>
</head>
<body>

  <div class="navbar">
    <h1><i class="fas fa-shield-alt"></i> ThreatGuard</h1>
  </div>

  <div class="container">
    <h2><i class="fas fa-exclamation-triangle"></i> Malicious Files</h2>
    <form id="fileForm" action="/scam/" method="post" enctype="multipart/form-data" onsubmit="showSpinner('fileForm','fileSpinner')">
      <label for="file"><strong>Upload a file (PDF/TXT only):</strong></label><br>
      <input type="file" name="file" required><br>
      <button type="submit"><i class="fas fa-upload scan-icon"></i> Analyze</button>
      <div id="fileSpinner" class="spinner"></div>
    </form>

    {% if message %}
      <h3>Results</h3>
    <p>{{message}}</p>
    {% endif %}
    

    <h2 style="margin-top: 40px;"><i class="fas fa-link"></i> URL Threat Detection</h2>
    <form id="urlForm" method="post" action="/predict" onsubmit="showSpinner('urlForm','urlSpinner')">
      <label for="url">Enter URL:</label>
      <input type="text" name="url" placeholder="https://example.com" required>
      <button type="submit"><i class="fas fa-search scan-icon"></i> Classify</button>
      <div id="urlSpinner" class="spinner"></div>
    </form>

    {% if predicted_class %}
            <div class="result-box {{ predicted_class.lower() }}">
                <p><strong>URL:</strong> {{ input_url }}</p>
                <p><strong>Predicted Class:</strong> {{ predicted_class }}</p>
            </div>
        {% endif %}
  </div>

</body>
</html>
